<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qijia Liao | PhD in Marketing · University of Liverpool</title>
    <meta name="description" content="Academic website of Qijia Liao, PhD candidate in Marketing at University of Liverpool. Research in digital marketing, brand activism, AI in marketing, and influencer marketing.">
    <meta name="keywords" content="Qijia Liao, Marketing PhD, Digital Marketing, Brand Activism, AI in Marketing, Marketing Analytics">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="gradient-bg"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#about" class="nav-logo">
                <span class="logo-text">Qijia Liao</span>
                <span class="logo-meta">UoL · Marketing</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#about"    class="nav-link active">Home</a></li>
                <li><a href="#research" class="nav-link">Research</a></li>
                <li><a href="#teaching" class="nav-link">Teaching</a></li>
                <li><a href="#cv"       class="nav-link">CV</a></li>
                <li><a href="#skills"   class="nav-link">Skills</a></li>
                <li><a href="#blog"     class="nav-link">Blog</a></li>
                <li><a href="#contact"  class="nav-link">Contact</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>
        </div>
    </nav>

    <div class="pages-container" id="pagesContainer">

        <!-- PAGE 1 · ABOUT -->
        <section id="about" class="page section hero-section">
            <div class="container">
                <div class="hero-content">
                    <div class="profile-container">
                        <img src="assets/images/photo.png" alt="Portrait of Qijia Liao" class="profile-photo">
                    </div>
                    <div class="hero-text" id="heroText"></div>
                </div>
            </div>
        </section>

        <!-- PAGE 2 · RESEARCH -->
        <section id="research" class="page section research-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Research</h2>
                    <span class="section-number">02 / 07</span>
                </div>
                <div class="research-content" id="researchContent"></div>
            </div>
        </section>

        <!-- PAGE 3 · TEACHING -->
        <section id="teaching" class="page section teaching-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Teaching</h2>
                    <span class="section-number">03 / 07</span>
                </div>
                <div class="teaching-content" id="teachingContent"></div>
            </div>
        </section>

        <!-- PAGE 4 · CV -->
        <section id="cv" class="page section cv-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Curriculum Vitae</h2>
                    <span class="section-number">04 / 07</span>
                </div>
                <div class="cv-content" id="cvContent"></div>
            </div>
        </section>

        <!-- PAGE 5 · SKILLS -->
        <section id="skills" class="page section skills-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Skills</h2>
                    <span class="section-number">05 / 07</span>
                </div>
                <div class="skills-content" id="skillsContent"></div>
            </div>
        </section>

        <!-- PAGE 6 · BLOG -->
        <section id="blog" class="page section blog-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Blog</h2>
                    <span class="section-number">06 / 07</span>
                </div>
                <div class="blog-controls">
                    <div class="blog-filter-tabs" id="filterContainer"></div>
                    <div class="blog-search-wrap">
                        <i class="fas fa-search"></i>
                        <input type="text" id="blogSearch" placeholder="Search&hellip;" aria-label="Search articles">
                    </div>
                </div>
                <div class="blog-list" id="blogGrid"></div>
            </div>
        </section>

        <!-- PAGE 7 · CONTACT -->
        <section id="contact" class="page section contact-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Contact</h2>
                    <span class="section-number">07 / 07</span>
                </div>
                <div class="contact-content" id="contactContent"></div>
            </div>
        </section>

    </div><!-- /pages-container -->

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <h3>Qijia Liao</h3>
                    <p>PhD in Marketing &nbsp;·&nbsp; University of Liverpool</p>
                </div>
                <div class="footer-right" id="footerRight"></div>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
